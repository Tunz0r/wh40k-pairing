<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH40K 5v5 Pairing Matrix</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { text-align: center; color: #c4a44a; font-size: 1.6rem; margin-bottom: 6px; letter-spacing: 1px; }
  .subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 16px; }
  .container { max-width: 960px; margin: 0 auto; }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .tab {
    padding: 6px 16px; border: 2px solid #333; background: #16213e; color: #888;
    border-radius: 6px 6px 0 0; cursor: pointer; font-size: 0.8rem; font-weight: 600;
    transition: all 0.2s; border-bottom: 2px solid #333; white-space: nowrap;
  }
  .tab:hover { color: #e0e0e0; border-color: #555; }
  .tab.active { color: #c4a44a; border-color: #c4a44a; background: #1a1a2e; border-bottom-color: #1a1a2e; }
  .tab.has-pairings::after { content: ' \2713'; color: #4a9; }
  .tab-actions { margin-left: auto; display: flex; gap: 6px; }
  .tab-actions button {
    padding: 4px 10px; border: 1px solid #444; background: #2a2a3e; color: #888;
    border-radius: 4px; cursor: pointer; font-size: 0.75rem;
  }
  .tab-actions button:hover { color: #e0e0e0; border-color: #666; }

  /* Sync bar */
  .sync-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 8px 12px;
    background: #16213e; border: 1px solid #333; border-radius: 6px; flex-wrap: wrap;
  }
  .sync-bar label { font-weight: 600; font-size: 0.82rem; white-space: nowrap; color: #a4a; }
  .sync-bar input {
    background: #1a1a2e; border: 1px solid #444; color: #e0e0e0; padding: 4px 8px;
    border-radius: 4px; font-size: 0.82rem; width: 280px; font-family: monospace;
  }
  .sync-bar input:focus { outline: 1px solid #c4a44a; }
  .sync-bar button {
    padding: 4px 12px; border: 1px solid #444; background: #2a2a3e; color: #ccc;
    border-radius: 4px; cursor: pointer; font-size: 0.78rem; font-weight: 600;
    transition: all 0.2s;
  }
  .sync-bar button:hover { border-color: #c4a44a; color: #c4a44a; }
  .sync-bar .sync-status { font-size: 0.75rem; margin-left: auto; }
  .sync-bar .sync-status.connected { color: #4a9; }
  .sync-bar .sync-status.disconnected { color: #888; }
  .sync-bar .sync-status.syncing { color: #c4a44a; }
  .sync-bar .sync-status.error { color: #f66; }

  .our-team-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 8px 12px; background: #16213e; border: 1px solid #333; border-radius: 6px; }
  .our-team-bar label { font-weight: 600; font-size: 0.85rem; white-space: nowrap; color: #4a9; }
  .our-team-bar input { flex: 1; background: transparent; border: 1px solid #333; color: #e0e0e0; padding: 3px 8px; border-radius: 4px; font-size: 0.85rem; }
  .our-team-bar input:focus { outline: 1px solid #c4a44a; }

  .team-headers { display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 20px; }
  .team-header { display: flex; align-items: center; gap: 8px; }
  .team-header label { font-weight: 600; font-size: 0.9rem; white-space: nowrap; }
  .team-header input { background: #16213e; border: 1px solid #333; color: #e0e0e0; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; width: 200px; }

  .matrix-wrapper { overflow-x: auto; margin-bottom: 20px; }
  table.matrix { border-collapse: collapse; width: 100%; }
  table.matrix th, table.matrix td { border: 1px solid #333; text-align: center; padding: 0; position: relative; }
  table.matrix th { background: #16213e; padding: 6px 4px; font-size: 0.8rem; font-weight: 600; }
  table.matrix th.corner { background: #1a1a2e; border-color: #1a1a2e; }
  table.matrix th.their-header { min-width: 100px; }
  table.matrix th.our-header { text-align: right; padding-right: 8px; min-width: 120px; }

  .army-input { background: transparent; border: none; color: #e0e0e0; text-align: center; width: 100%; font-size: 0.8rem; font-weight: 600; padding: 2px; }
  .army-input:focus { outline: 1px solid #c4a44a; background: #16213e; }
  th.our-header .army-input { text-align: right; }

  .color-cell { width: 100px; height: 48px; cursor: pointer; transition: opacity 0.3s, filter 0.3s; font-size: 0.75rem; font-weight: 700; user-select: none; }
  .color-cell:hover { filter: brightness(1.2); }
  .color-cell.none { background: #2a2a3e; color: #555; }
  .color-cell.green { background: #2d6a2d; color: #8f8; }
  .color-cell.yellow { background: #7a6a1a; color: #ffd; }
  .color-cell.red { background: #6a2d2d; color: #f88; }
  .color-cell.faded { opacity: 0.15; pointer-events: none; }
  .color-cell.matched {
    opacity: 1 !important; pointer-events: none;
    box-shadow: inset 0 0 0 3px #c4a44a, 0 0 12px rgba(196,164,74,0.4); position: relative;
  }
  .color-cell.matched::after {
    content: attr(data-match-num); position: absolute; top: 2px; right: 4px;
    font-size: 0.6rem; color: #c4a44a; font-weight: 700;
  }

  .pairing-section { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .pairing-section h2 { font-size: 1.1rem; color: #c4a44a; margin-bottom: 12px; }
  .step-info { background: #1a1a2e; border-radius: 6px; padding: 12px; margin-bottom: 12px; font-size: 0.9rem; line-height: 1.5; border-left: 3px solid #c4a44a; }
  .army-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .army-btn { padding: 8px 16px; border: 2px solid #444; background: #2a2a3e; color: #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
  .army-btn:hover { border-color: #c4a44a; background: #333; }
  .army-btn.selected { border-color: #c4a44a; background: #3a3520; color: #c4a44a; }
  .army-btn.counter-selected { border-color: #e06040; background: #3a2020; color: #e0a080; }
  .action-btn { padding: 8px 24px; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .action-btn.primary { background: #c4a44a; color: #1a1a2e; }
  .action-btn.primary:hover:not(:disabled) { background: #d4b45a; }
  .action-btn.danger { background: #6a2d2d; color: #f88; }
  .action-btn.danger:hover:not(:disabled) { background: #7a3d3d; }
  .actions-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .pairings-log { margin-top: 12px; }
  .pairings-log h3 { font-size: 0.95rem; margin-bottom: 8px; color: #c4a44a; }
  .pairing-entry { display: flex; align-items: center; gap: 10px; padding: 6px 10px; background: #1a1a2e; border-radius: 4px; margin-bottom: 4px; font-size: 0.85rem; flex-wrap: wrap; }
  .pairing-entry .round-num { color: #c4a44a; font-weight: 700; min-width: 20px; }
  .pairing-entry .vs { color: #888; }
  .pairing-entry .matchup-color { display: inline-block; width: 14px; height: 14px; border-radius: 3px; margin-left: 6px; }
  .pairing-entry .map-info { font-size: 0.75rem; color: #888; margin-left: auto; }
  .first-toggle { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .first-toggle label { font-size: 0.85rem; }
  .toggle-btn { padding: 6px 14px; border: 2px solid #444; background: #2a2a3e; color: #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
  .toggle-btn.active { border-color: #c4a44a; background: #3a3520; color: #c4a44a; }
  .parallel-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 12px; }
  .col-panel { background: #1a1a2e; border-radius: 6px; padding: 12px; border: 1px solid #333; }
  .col-panel h4 { font-size: 0.85rem; margin-bottom: 8px; color: #c4a44a; }
  .col-panel.us-panel { border-left: 3px solid #4a9; }
  .col-panel.them-panel { border-left: 3px solid #a4a; }
  .pick-btn { padding: 10px 16px; border: 2px solid #444; background: #2a2a3e; color: #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; min-width: 140px; text-align: center; }
  .pick-btn:hover { filter: brightness(1.2); }
  .summary-box { background: #1a1a2e; border: 1px dashed #555; border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; font-size: 0.85rem; }
  .summary-box .defender-label { color: #c4a44a; font-weight: 600; }
  .optimal-section { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .optimal-section h2 { font-size: 1.1rem; color: #c4a44a; margin-bottom: 12px; }
  .optimal-assignment { margin-bottom: 12px; }
  .optimal-entry { display: flex; align-items: center; gap: 10px; padding: 6px 10px; background: #1a1a2e; border-radius: 4px; margin-bottom: 4px; font-size: 0.85rem; }
  .optimal-entry .matchup-color { display: inline-block; width: 14px; height: 14px; border-radius: 3px; }
  .defender-rec { background: #1a1a2e; border-radius: 6px; padding: 12px; margin-top: 10px; border: 1px solid #333; }
  .defender-rec h4 { font-size: 0.9rem; color: #c4a44a; margin-bottom: 8px; }
  .defender-rec .rec-item { padding: 4px 0; font-size: 0.85rem; border-bottom: 1px solid #222; }
  .defender-rec .rec-item:last-child { border-bottom: none; }
  .rec-rank { color: #c4a44a; font-weight: 700; margin-right: 8px; }
  .rec-score { color: #888; font-size: 0.8rem; margin-left: 8px; }
  .score-total { font-size: 0.9rem; color: #c4a44a; font-weight: 600; margin-top: 8px; }

  /* Map selection */
  .map-select-panel { background: #1a1a2e; border: 2px solid #c4a44a; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .map-select-panel h4 { color: #c4a44a; font-size: 0.95rem; margin-bottom: 12px; }
  .map-selectors { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: flex-end; }
  .map-selectors .sel-group { display: flex; flex-direction: column; gap: 4px; }
  .map-selectors label { font-size: 0.78rem; color: #888; font-weight: 600; }
  .map-selectors select {
    background: #16213e; border: 1px solid #444; color: #e0e0e0; padding: 6px 10px;
    border-radius: 4px; font-size: 0.85rem; min-width: 180px; cursor: pointer;
  }
  .map-selectors select:focus { outline: 1px solid #c4a44a; }
  .map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 12px; max-height: 400px; overflow-y: auto; padding: 4px; }
  .map-card {
    border: 2px solid #333; border-radius: 6px; cursor: pointer; overflow: hidden;
    transition: all 0.2s; background: #2a2a3e;
  }
  .map-card:hover { border-color: #888; transform: scale(1.02); }
  .map-card.selected { border-color: #c4a44a; box-shadow: 0 0 12px rgba(196,164,74,0.4); }
  .map-card img { width: 100%; height: 120px; object-fit: cover; display: block; background: #111; }
  .map-card .map-label { padding: 4px 8px; font-size: 0.72rem; font-weight: 600; color: #ccc; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .map-no-results { color: #888; font-size: 0.85rem; font-style: italic; padding: 20px; text-align: center; }
  .map-preview { margin-top: 8px; text-align: center; }
  .map-preview img { max-width: 100%; max-height: 300px; border-radius: 6px; border: 1px solid #444; }

  /* Login overlay */
  .login-overlay {
    position: fixed; inset: 0; background: #1a1a2e; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
  }
  .login-overlay.hidden { display: none; }
  .login-box {
    background: #16213e; border: 2px solid #c4a44a; border-radius: 12px;
    padding: 40px; max-width: 380px; width: 90%; text-align: center;
  }
  .login-box h1 { margin-bottom: 4px; font-size: 1.4rem; }
  .login-box .login-sub { color: #888; font-size: 0.82rem; margin-bottom: 24px; }
  .login-box input {
    display: block; width: 100%; margin-bottom: 12px; padding: 10px 14px;
    background: #1a1a2e; border: 1px solid #444; color: #e0e0e0;
    border-radius: 6px; font-size: 0.9rem;
  }
  .login-box input:focus { outline: 2px solid #c4a44a; border-color: #c4a44a; }
  .login-box button {
    width: 100%; padding: 10px; background: #c4a44a; color: #1a1a2e;
    border: none; border-radius: 6px; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .login-box button:hover { background: #d4b45a; }
  .login-box .login-err { color: #f66; font-size: 0.82rem; margin-top: 10px; min-height: 1.2em; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h1>Old Grumpy Bastards</h1>
    <p class="login-sub">WH40K Team Pairing Tool</p>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
    <button onclick="doLogin()">Login</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="container" id="appContainer" style="display:none;">
  <h1>WH40K Team Pairing Matrix</h1>
  <p class="subtitle">Click cells to set matchup rating &bull; All data auto-saves &bull; <a href="#" onclick="doLogout();return false;" style="color:#888;font-size:0.78rem;">Logout</a></p>

  <!-- SYNC STATUS -->
  <div class="sync-bar" id="syncBar">
    <label>Cloud Sync:</label>
    <span id="syncStatus" class="sync-status syncing">Connecting...</span>
    <button onclick="pushToRemote()" style="margin-left:auto;">Force Push</button>
    <button onclick="pullFromRemote(true)">Force Pull</button>
    <button onclick="setGhToken()">Set Token</button>
  </div>

  <div class="our-team-bar">
    <label>Our Team:</label>
    <input type="text" id="ourTeamName" value="Old Grumpy Bastards" oninput="saveState()">
  </div>

  <div class="tab-bar" id="tabBar"></div>

  <div id="gameContent">
    <div class="team-headers">
      <div class="team-header">
        <label>Opponent:</label>
        <input type="text" id="theirTeamName" value="Opponent 1" oninput="game().theirTeamName=this.value;saveState();renderTabs();">
      </div>
    </div>
    <div class="matrix-wrapper"><table class="matrix" id="matrixTable"></table></div>
    <div class="optimal-section">
      <h2>Optimal Path Suggestion</h2>
      <div id="optimalContent"></div>
    </div>
    <div class="pairing-section" style="margin-bottom:16px;">
      <h2>Round Settings</h2>
      <div class="map-selectors" style="margin-bottom:0;">
        <div class="sel-group">
          <label>Mission</label>
          <select id="gameMission" onchange="game().mission=this.value;saveState();">
            <option value="">-- Select Mission --</option>
          </select>
        </div>
        <div class="sel-group">
          <label>Deployment</label>
          <select id="gameDeployment" onchange="game().deployment=this.value;selMapId='';saveState();">
            <option value="">-- Select Deployment --</option>
          </select>
        </div>
      </div>
    </div>

    <div class="pairing-section">
      <h2>Pairing Process</h2>
      <div class="first-toggle">
        <label>Who picks table first?</label>
        <button class="toggle-btn active" onclick="setTablePick('us')" id="toggleUs">We do</button>
        <button class="toggle-btn" onclick="setTablePick('them')" id="toggleThem">They do</button>
      </div>
      <div class="step-info" id="stepInfo">Press "Start Pairing" to begin.</div>
      <div id="pairingControls" style="display:none;"></div>
      <div class="actions-row" style="margin-top:12px;">
        <button class="action-btn primary" id="startBtn" onclick="startPairing()">Start Pairing</button>
        <button class="action-btn danger" id="resetBtn" onclick="resetPairing()" style="display:none;">Reset Pairings</button>
        <button class="action-btn danger" id="resetGameBtn" onclick="resetGame()" style="display:none;">Reset This Game</button>
      </div>
      <div class="pairings-log" id="pairingsLog" style="display:none;">
        <h3>Confirmed Pairings</h3>
        <div id="pairingsList"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ========== LOGIN ==========
const AUTH_KEY = 'wh40k_auth';
const VALID_USER = 'mbn';
const VALID_HASH = '78'; // simple hash of password

function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) & 0xffffff;
  return h.toString(16);
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  if (u === VALID_USER && simpleHash(p) === VALID_HASH) {
    try { localStorage.setItem(AUTH_KEY, u); } catch(e) {}
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appContainer').style.display = '';
    initApp();
  } else {
    document.getElementById('loginErr').textContent = 'Invalid username or password';
  }
}

function doLogout() {
  try { localStorage.removeItem(AUTH_KEY); } catch(e) {}
  location.reload();
}

// Check if already logged in
function checkAuth() {
  try {
    if (localStorage.getItem(AUTH_KEY) === VALID_USER) {
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('appContainer').style.display = '';
      initApp();
      return;
    }
  } catch(e) {}
  // Show login - listen for Enter key
  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });
}

const NUM = 5;
const MAX_GAMES = 10;
const STORAGE_KEY = 'wh40k_pairing_v5';
const GH_REPO = 'Tunz0r/wh40k-pairing';
const GH_FILE = 'data.json';
const GH_BRANCH = 'gh-pages';
const GH_TOKEN_KEY = 'wh40k_gh_token';

// ========== MISSIONS & MAPS DATA ==========
const MISSIONS = [
  'Take and Hold','Supply Drop','Linchpin','Scorched Earth','Hidden Supplies',
  'Purge the Foe','Terraform','Unexploded Ordnance','The Ritual','Syphoned Power',
  'Establish Control','Uneven Ground','Denied Resources','Hold Out'
];

const DEPLOYMENTS = [
  'Hammer and Anvil','Crucible of Battle','Search and Destroy',
  'Tipping Point','Sweeping Engagement','Dawn of War'
];

const MAP_BASE = 'https://mikeporterdev.github.io/41k-map-browser/images';

// WTC 2025 maps
const WTC2025 = [
  {id:'search1',d:'Search and Destroy'},{id:'search2',d:'Search and Destroy'},{id:'search3',d:'Search and Destroy'},
  {id:'search45',d:'Search and Destroy'},{id:'search6',d:'Search and Destroy'},{id:'search7',d:'Search and Destroy'},{id:'search8',d:'Search and Destroy'},
  {id:'crucible1',d:'Crucible of Battle'},{id:'crucible2',d:'Crucible of Battle'},{id:'crucible3',d:'Crucible of Battle'},
  {id:'crucible45',d:'Crucible of Battle'},{id:'crucible6',d:'Crucible of Battle'},{id:'crucible7',d:'Crucible of Battle'},{id:'crucible8',d:'Crucible of Battle'},
  {id:'hammer1',d:'Hammer and Anvil'},{id:'hammer2',d:'Hammer and Anvil'},{id:'hammer3',d:'Hammer and Anvil'},
  {id:'hammer45',d:'Hammer and Anvil'},{id:'hammer6',d:'Hammer and Anvil'},{id:'hammer7',d:'Hammer and Anvil'},{id:'hammer8',d:'Hammer and Anvil'},
  {id:'tipping1',d:'Tipping Point'},{id:'tipping2',d:'Tipping Point'},{id:'tipping3',d:'Tipping Point'},
  {id:'tipping45',d:'Tipping Point'},{id:'tipping6',d:'Tipping Point'},{id:'tipping7',d:'Tipping Point'},{id:'tipping8',d:'Tipping Point'},
  {id:'sweeping1',d:'Sweeping Engagement'},{id:'sweeping2',d:'Sweeping Engagement'},{id:'sweeping3',d:'Sweeping Engagement'},
  {id:'sweeping4',d:'Sweeping Engagement'},{id:'sweeping5',d:'Sweeping Engagement'},{id:'sweeping6',d:'Sweeping Engagement'},
  {id:'dawn1',d:'Dawn of War'},{id:'dawn2',d:'Dawn of War'},{id:'dawn3',d:'Dawn of War'},
  {id:'dawn4',d:'Dawn of War'},{id:'dawn5',d:'Dawn of War'},{id:'dawn6',d:'Dawn of War'},
];

// WTC 2024 maps (numeric IDs, cycling S&D/Crucible/H&A in groups)
const WTC2024 = [];
const depCycle = ['Search and Destroy','Crucible of Battle','Hammer and Anvil'];
const weights = [{start:1,w:'Medium'},{start:17,w:'Heavy'},{start:33,w:'Light'}];
for (const wg of weights) {
  let n = wg.start;
  for (let g = 0; g < 4; g++) {
    for (let d = 0; d < 3; d++) {
      WTC2024.push({id:String(n), d:depCycle[d], w:wg.w});
      n++;
    }
    n++; // skip gap
  }
}
// Tipping Point maps 49-56
const tpWeights = ['Heavy','Heavy','Medium','Medium','Medium','Medium','Light','Light'];
for (let i = 49; i <= 56; i++) WTC2024.push({id:String(i), d:'Tipping Point', w:tpWeights[i-49]});
// Sweeping Engagement 57
WTC2024.push({id:'57', d:'Sweeping Engagement', w:'Medium'});

// GW maps
const GW_MAPS = [
  {id:'1',d:['Hammer and Anvil','Search and Destroy']},
  {id:'2',d:['Crucible of Battle','Dawn of War']},
  {id:'3',d:['Search and Destroy','Tipping Point']},
  {id:'4',d:['Hammer and Anvil','Sweeping Engagement']},
  {id:'5',d:['Crucible of Battle','Tipping Point']},

function getMapsForDeployment(packId, deployment) {

function mapLabel(packId, mapId) {

// ========== CLOUD SYNC (GitHub Contents API) ==========
let syncInterval = null;
let lastRemoteTs = 0;
let lastLocalTs = 0;
let pushDebounce = null;
let suppressRemote = false;
let fileSha = null;
let ghToken = '';
let syncBusy = false; // mutex to prevent concurrent push/pull

function getGhToken() {
  if (ghToken) return ghToken;
  try { ghToken = localStorage.getItem(GH_TOKEN_KEY) || ''; } catch(e) {}
  return ghToken;
}

function setSyncStatus(text, cls) {
  const el = document.getElementById('syncStatus');
  if (el) { el.textContent = text; el.className = 'sync-status ' + cls; }
}

function buildPayload() {
  lastLocalTs = Date.now();
  return { ourTeamName, ourArmies, games, activeGame, ts: lastLocalTs };
}

function localHasData() {
  return games.some(g => g.pairings.length > 0 ||
    g.theirTeamName !== ('Opponent ' + (games.indexOf(g) + 1)) ||
    g.ratings.some(row => row.some(c => c !== 'none')) ||
    g.theirArmies.some(a => !a.match(/^Army [1-5]$/))
  ) || ourArmies.some(a => !a.match(/^Army [1-5]$/));
}

function applyPayload(data) {
  if (!data || !data.games) return;
  suppressRemote = true;
  if (data.ourTeamName) { ourTeamName = data.ourTeamName; document.getElementById('ourTeamName').value = ourTeamName; }
  if (data.ourArmies) ourArmies = data.ourArmies;
  if (data.games) {
    games = data.games;
    while (games.length < 5) games.push(makeGame(games.length));
  }
  lastRemoteTs = data.ts || 0;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ ourTeamName, ourArmies, games, activeGame })); } catch(e) {}
  loadGame();
  suppressRemote = false;
}

// Fetch file content + SHA from GitHub API (bypasses CDN cache)
async function ghApiFetch(token) {
  const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`, {
    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const meta = await res.json();
  fileSha = meta.sha;
  // Decode base64 content (GitHub returns with newlines)
  const raw = atob(meta.content.replace(/\n/g, ''));
  return JSON.parse(raw);
}

async function pushToRemote(retryCount) {
  if (suppressRemote) return;
  const token = getGhToken();
  if (!token) { setSyncStatus('No token \u2014 click Set Token', 'disconnected'); return; }
  if (syncBusy) { debouncedPush(); return; } // re-queue if busy
  syncBusy = true;
  setSyncStatus('Saving...', 'syncing');
  try {
    // Always get fresh SHA before pushing
    if (!fileSha) {
      try { await ghApiFetch(token); } catch(e) {}
    }
    const payload = buildPayload();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const body = { message: 'sync', content, branch: GH_BRANCH };
    if (fileSha) body.sha = fileSha;
    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      // SHA mismatch — refresh SHA and retry once
      if (res.status === 409 || (e.message && e.message.includes('does not match'))) {
        fileSha = null;
        if (!retryCount) { syncBusy = false; return pushToRemote(1); }
      }
      throw new Error(e.message || 'HTTP ' + res.status);
    }
    const result = await res.json();
    fileSha = result.content.sha;
    lastRemoteTs = payload.ts;
    setSyncStatus('Synced \u2713', 'connected');
  } catch (e) {
    console.error('Push failed:', e);
    setSyncStatus('Push error: ' + e.message, 'error');
  } finally {
    syncBusy = false;
  }
}

async function pullFromRemote(force) {
  const token = getGhToken();
  if (!token) return; // Can't pull without token (CDN too stale)
  if (syncBusy) return; // Don't pull while pushing
  syncBusy = true;
  if (force) setSyncStatus('Pulling...', 'syncing');
  try {
    // Always read from GitHub API (bypasses CDN cache, keeps SHA fresh)
    const data = await ghApiFetch(token);
    const remoteTs = data.ts || 0;
    if (force || (remoteTs > lastRemoteTs && remoteTs > lastLocalTs)) {
      lastRemoteTs = remoteTs;
      applyPayload(data);
      setSyncStatus('Synced \u2713', 'connected');
    }
  } catch (e) {
    console.error('Pull failed:', e);
    if (force) setSyncStatus('Pull error: ' + e.message, 'error');
  } finally {
    syncBusy = false;
  }
}

function startSyncPolling() {
  if (syncInterval) clearInterval(syncInterval);
  syncInterval = setInterval(() => pullFromRemote(false), 10000);
}

function debouncedPush() {
  if (pushDebounce) clearTimeout(pushDebounce);
  pushDebounce = setTimeout(pushToRemote, 1500);
}

function setGhToken() {
  const t = prompt('Enter GitHub Personal Access Token (classic, with repo scope):');
  if (t && t.trim()) {
    ghToken = t.trim();
    try { localStorage.setItem(GH_TOKEN_KEY, ghToken); } catch(e) {}
    setSyncStatus('Token saved \u2014 syncing...', 'syncing');
    fileSha = null; // Force fresh SHA fetch
    pushToRemote();
  }
}

// ========== OPTIMAL PATH ==========
function ratingScore(c) { return c === 'green' ? 3 : c === 'yellow' ? 2 : c === 'red' ? 0 : 1; }

function computeOptimal() {
  const g = game();
  const ratings = g.ratings;
  const theirArmies = g.theirArmies;
  const container = document.getElementById('optimalContent');
  const hasRatings = ratings.some(row => row.some(c => c !== 'none'));
  if (!hasRatings) { container.innerHTML = '<p style="color:#888;font-size:0.85rem;">Set matchup colors in the matrix to see suggestions.</p>'; return; }

  const perms = getPermutations([0,1,2,3,4]);
  let bestScore = -1, bestPerm = null;
  for (const perm of perms) {
    let score = 0;
    for (let i = 0; i < NUM; i++) score += ratingScore(ratings[i][perm[i]]);
    if (score > bestScore) { bestScore = score; bestPerm = perm; }
  }
  const defenderScores = [], attackerScores = [];
  for (let i = 0; i < NUM; i++) {
    const available = ratings[i].filter((_, j) => !pairedTheirs.has(j));
    const scores = available.map(c => ratingScore(c));
    const minS = Math.min(...scores), avgS = scores.reduce((a,b)=>a+b,0)/scores.length;
    const maxS = Math.max(...scores), spread = maxS - minS;
    defenderScores.push({idx:i,minScore:minS,avgScore:avgS,safeScore:minS*2+avgS});
    attackerScores.push({idx:i,maxScore:maxS,spread,attackScore:maxS*2+spread});
  }
  defenderScores.sort((a,b)=>b.safeScore-a.safeScore);
  attackerScores.sort((a,b)=>b.attackScore-a.attackScore);

  const maxPossible = NUM * 3, pctLabel = Math.round(bestScore/maxPossible*100);
  let html = `<div class="optimal-assignment"><h4 style="font-size:0.9rem;color:#c4a44a;margin-bottom:8px;">Best Matchup Assignment</h4>`;
  for (let i = 0; i < NUM; i++) {
    const j = bestPerm[i], c = ratings[i][j];
    html += `<div class="optimal-entry"><span class="matchup-color" style="background:${colorBg(c)}"></span><span>${esc(ourArmies[i])}</span><span style="color:#888;">vs</span><span>${esc(theirArmies[j])}</span><span style="color:#666;font-size:0.8rem;">(${colorLabel(c)||'?'})</span></div>`;
  }
  html += `<div class="score-total">Total score: ${bestScore}/${maxPossible} (${pctLabel}%)</div></div>`;
  html += `<div class="defender-rec"><h4>Defender Ranking (safest to put forward)</h4><p style="font-size:0.78rem;color:#888;margin-bottom:6px;">Armies with the best worst-case matchups.</p>`;
  for (const d of defenderScores) {
    if (pairedOurs.has(d.idx)) continue;
    const wl = d.minScore>=3?'Green':d.minScore>=2?'Yellow':d.minScore>=1?'Neutral':'Red';
    html += `<div class="rec-item"><span class="rec-rank">${defenderScores.indexOf(d)+1}.</span>${esc(ourArmies[d.idx])}<span class="rec-score">worst: ${wl} · avg: ${d.avgScore.toFixed(1)}</span></div>`;
  }
  html += `</div>`;
  html += `<div class="defender-rec" style="margin-top:10px;"><h4>Counter Ranking (best as attackers)</h4><p style="font-size:0.78rem;color:#888;margin-bottom:6px;">Specialist armies with strong specific matchups.</p>`;
  for (const a of attackerScores) {
    if (pairedOurs.has(a.idx)) continue;
    let bt=-1,bts=-1;
    for (let j=0;j<NUM;j++){if(pairedTheirs.has(j))continue;const s=ratingScore(ratings[a.idx][j]);if(s>bts){bts=s;bt=j;}}
    html += `<div class="rec-item"><span class="rec-rank">${attackerScores.indexOf(a)+1}.</span>${esc(ourArmies[a.idx])}<span class="rec-score">best target: ${esc(bt>=0?theirArmies[bt]:'?')} · spread: ${a.spread}</span></div>`;
  }
  html += `</div>`;
  container.innerHTML = html;
}

function getPermutations(arr) {
  if (arr.length<=1) return [arr];
  const r=[];
  for (let i=0;i<arr.length;i++){const rest=[...arr.slice(0,i),...arr.slice(i+1)];for(const p of getPermutations(rest))r.push([arr[i],...p]);}
  return r;
}

function colorBg(c) { return c==='green'?'#2d6a2d':c==='yellow'?'#7a6a1a':c==='red'?'#6a2d2d':'#2a2a3e'; }

function render() {
  const g = game(), ratings = g.ratings, theirArmies = g.theirArmies, pairings = g.pairings;

  html+='</tr>';
  for (let i=0;i<NUM;i++){
    html+=`<tr><th class="our-header"><input class="army-input" value="${esc(ourArmies[i])}" onchange="updateArmyName('ours',${i},this.value)"></th>`;
    for (let j=0;j<NUM;j++){

      if(mn>0) html+=`<td class="color-cell ${r} matched" data-match-num="#${mn}">${colorLabel(r)}</td>`;
      else if(pairedOurs.has(i)||pairedTheirs.has(j)) html+=`<td class="color-cell ${r} faded">${colorLabel(r)}</td>`;
      else html+=`<td class="color-cell ${r}" onclick="cycleColor(${i},${j})">${colorLabel(r)}</td>`;
    }
    html+='</tr>';
  }
  table.innerHTML=html;
  const logDiv=document.getElementById('pairingsLog'),listDiv=document.getElementById('pairingsList');
  if(pairings.length>0){
    logDiv.style.display='block';

        <span class="round-num">${i+1}.</span>
        <span>${esc(ourArmies[p.ours])}</span>
        <span class="vs">vs</span>
        <span>${esc(theirArmies[p.theirs])}</span>
        <span class="matchup-color" style="background:${colorBg(c)}"></span>
        ${mapInfo ? `<span class="map-info">${esc(mapInfo)}</span>` : ''}
      </div>`;
    }).join('');
  }
  else logDiv.style.display='none';
  computeOptimal();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function availableOurs(){return[...Array(NUM).keys()].filter(i=>!pairedOurs.has(i));}

function beginRound(){
  const g=game(),ao=availableOurs(),at=availableTheirs();
  if(ao.length===1&&at.length===1){

    pendingPairing = {ours:ao[0], theirs:at[0]};

  ourDefenderIdx=null;theirDefenderIdx=null;ourCounters=[];theirCounters=[];currentStep='defenders';renderStep();
}

function renderStep(){const g=game(),ratings=g.ratings,theirArmies=g.theirArmies,info=document.getElementById('stepInfo'),ctrl=document.getElementById('pairingControls');ctrl.style.display='';const ao=availableOurs(),at=availableTheirs();
if(currentStep==='defenders'){info.innerHTML=`<strong>Round ${roundNum+1}:</strong> Both teams put forward a defender simultaneously.`;ctrl.innerHTML=`<div class="parallel-cols"><div class="col-panel us-panel"><h4>Our Defender</h4><div class="army-buttons">${ao.map(i=>`<button class="army-btn ${ourDefenderIdx===i?'selected':''}" onclick="selectOurDefender(${i})">${esc(ourArmies[i])}</button>`).join('')}</div></div><div class="col-panel them-panel"><h4>Their Defender</h4><div class="army-buttons">${at.map(j=>`<button class="army-btn ${theirDefenderIdx===j?'selected':''}" onclick="selectTheirDefender(${j})">${esc(theirArmies[j])}</button>`).join('')}</div></div></div><div class="actions-row"><button class="action-btn primary" onclick="confirmDefenders()" ${ourDefenderIdx===null||theirDefenderIdx===null?'disabled':''}>Confirm Defenders</button></div>`;}
else if(currentStep==='counters'){const oac=ao.filter(i=>i!==ourDefenderIdx),tac=at.filter(j=>j!==theirDefenderIdx);info.innerHTML=`<strong>Round ${roundNum+1}:</strong> Defenders: <em>${esc(ourArmies[ourDefenderIdx])}</em> (us) &amp; <em>${esc(theirArmies[theirDefenderIdx])}</em> (them). Counter with 2.`;ctrl.innerHTML=`<div class="parallel-cols"><div class="col-panel us-panel"><h4>Our 2 vs <em>${esc(theirArmies[theirDefenderIdx])}</em></h4><div class="army-buttons">${oac.map(i=>{const c=ratings[i][theirDefenderIdx],t=colorLabel(c)?` (${colorLabel(c)})`:'';return`<button class="army-btn ${ourCounters.includes(i)?'counter-selected':''}" onclick="toggleOurCounter(${i})">${esc(ourArmies[i])}${t}</button>`;}).join('')}</div></div><div class="col-panel them-panel"><h4>Their 2 vs <em>${esc(ourArmies[ourDefenderIdx])}</em></h4><div class="army-buttons">${tac.map(j=>{const c=ratings[ourDefenderIdx][j],t=colorLabel(c)?` (${colorLabel(c)})`:'';return`<button class="army-btn ${theirCounters.includes(j)?'counter-selected':''}" onclick="toggleTheirCounter(${j})">${esc(theirArmies[j])}${t}</button>`;}).join('')}</div></div></div><div class="actions-row"><button class="action-btn primary" onclick="confirmCounters()" ${ourCounters.length!==2||theirCounters.length!==2?'disabled':''}>Confirm Counters</button></div>`;}
else if(currentStep==='pick1'){renderPickStep(game().tablePick,'pick1');}
else if(currentStep==='pick2'){renderPickStep(game().tablePick==='us'?'them':'us','pick2');}
else if(currentStep==='mapSelect'){renderMapSelect();}}

function renderPickStep(picker,stepId){const g=game(),ratings=g.ratings,ta=g.theirArmies,info=document.getElementById('stepInfo'),ctrl=document.getElementById('pairingControls');
if(picker==='us'){info.innerHTML=`<strong>Round ${roundNum+1} – ${stepId==='pick1'?'1st':'2nd'} Pick:</strong> WE pick vs our <em>${esc(ourArmies[ourDefenderIdx])}</em>.`;ctrl.innerHTML=`<div class="summary-box"><span class="defender-label">Our defender:</span> ${esc(ourArmies[ourDefenderIdx])} — countered by: ${theirCounters.map(j=>esc(ta[j])).join(' & ')}</div><p style="font-size:0.85rem;margin-bottom:8px;">Pick matchup:</p><div class="army-buttons">${theirCounters.map(j=>{const c=ratings[ourDefenderIdx][j],l=colorLabel(c)||'?',bg=colorBg(c);return`<button class="pick-btn" onclick="makePick('us',${j})" style="border-color:${bg};background:${bg};">${esc(ta[j])}<br><small style="opacity:0.8">${l}</small></button>`;}).join('')}</div>`;}
else{info.innerHTML=`<strong>Round ${roundNum+1} – ${stepId==='pick1'?'1st':'2nd'} Pick:</strong> THEY pick vs their <em>${esc(ta[theirDefenderIdx])}</em>.`;ctrl.innerHTML=`<div class="summary-box"><span class="defender-label">Their defender:</span> ${esc(ta[theirDefenderIdx])} — countered by: ${ourCounters.map(i=>esc(ourArmies[i])).join(' & ')}</div><p style="font-size:0.85rem;margin-bottom:8px;">They pick:</p><div class="army-buttons">${ourCounters.map(i=>{const c=ratings[i][theirDefenderIdx],l=colorLabel(c)||'?',bg=colorBg(c);return`<button class="pick-btn" onclick="makePick('them',${i})" style="border-color:${bg};background:${bg};">${esc(ourArmies[i])}<br><small style="opacity:0.8">${l}</small></button>`;}).join('')}</div>`;}}

function renderMapSelect() {
  const g = game(), info = document.getElementById('stepInfo'), ctrl = document.getElementById('pairingControls');
  ctrl.style.display = '';
  const p = pendingPairing;
  const ourName = ourArmies[p.ours], theirName = g.theirArmies[p.theirs];
  const c = g.ratings[p.ours][p.theirs];
  const dep = g.deployment;

  info.innerHTML = `<strong>Select Map</strong> for: <em>${esc(ourName)}</em> <span style="color:#888">vs</span> <em>${esc(theirName)}</em> <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:${colorBg(c)};vertical-align:middle;margin-left:4px;"></span>`;

  // Collect maps already used in this game's pairings
  const usedMaps = new Set();
  g.pairings.forEach(pr => { if (pr.mapPack === selMapPack && pr.mapId) usedMaps.add(pr.mapId); });

  const allMaps = dep ? getMapsForDeployment(selMapPack, dep) : [];
  const filteredMaps = allMaps.filter(m => !usedMaps.has(m.id));
  const canConfirm = selMapId;

  let mapGridHtml = '';
  if (!dep) {
    mapGridHtml = '<div class="map-no-results">Set deployment type in Round Settings above to see maps</div>';
  } else if (filteredMaps.length === 0) {
    mapGridHtml = '<div class="map-no-results">No available maps for this deployment (all used)</div>';
  } else {
    mapGridHtml = '<div class="map-grid">' + filteredMaps.map(m => {
      const mid = m.id;
      const sel = selMapId === mid ? 'selected' : '';
      const url = mapImageUrl(selMapPack, mid);
      const lbl = mapLabel(selMapPack, mid);
      return `<div class="map-card ${sel}" onclick="selectMap('${mid}')">
        <img src="${url}" alt="${esc(lbl)}" loading="lazy" onerror="this.style.display='none'">
        <div class="map-label">${esc(lbl)}</div>
      </div>`;
    }).join('') + '</div>';
  }

  let previewHtml = '';
  if (selMapId && dep) {
    previewHtml = `<div class="map-preview"><img src="${mapImageUrl(selMapPack, selMapId)}" alt="Selected map" onerror="this.style.display='none'"></div>`;
  }

  ctrl.innerHTML = `
    <div class="map-select-panel">
      <h4>Map Selection${dep ? ' \u2014 ' + esc(dep) : ''}</h4>
      <div class="map-selectors">
        <div class="sel-group">
          <label>Map Pack</label>
          <select onchange="selMapPack=this.value;selMapId='';renderMapSelect()">
            ${Object.entries(MAP_PACKS).map(([k,v]) => `<option value="${k}" ${selMapPack===k?'selected':''}>${v.name}</option>`).join('')}
          </select>
        </div>
      </div>
      ${mapGridHtml}
      ${previewHtml}
      <div class="actions-row" style="margin-top:12px;">
        <button class="action-btn primary" onclick="confirmMapSelection()" ${canConfirm?'':'disabled'}>Confirm Map</button>
        ${!canConfirm ? '<span style="font-size:0.78rem;color:#888;">Select a map to continue</span>' : ''}
      </div>
    </div>`;
}

function selectMap(id) {
  selMapId = id;
  renderMapSelect();
}

function confirmMapSelection() {
  if (!selMapId || !pendingPairing) return;
  const g = game();
  g.pairings.push({
    ours: pendingPairing.ours,
    theirs: pendingPairing.theirs,
    mapPack: selMapPack,
    mapId: selMapId,
  });
  saveState();
  render();

  const afterStep = pendingAfterStep;
  pendingPairing = null;
  selMapId = '';

  if (afterStep === 'pick2') {
    currentStep = 'pick2';
    renderStep();
  } else if (afterStep === 'nextRound') {
    roundNum++;
    beginRound();
  } else {
    // done - all 5 paired
    document.getElementById('stepInfo').innerHTML = '<strong>All 5 pairings complete!</strong>';
    document.getElementById('pairingControls').style.display = 'none';
    document.getElementById('pairingControls').innerHTML = '';
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('resetGameBtn').style.display = '';
    renderTabs();
  }
}

function selectOurDefender(i){ourDefenderIdx=i;renderStep();}
function selectTheirDefender(j){theirDefenderIdx=j;renderStep();}
function confirmDefenders(){if(ourDefenderIdx===null||theirDefenderIdx===null)return;currentStep='counters';ourCounters=[];theirCounters=[];renderStep();}
function toggleOurCounter(i){if(ourCounters.includes(i))ourCounters=ourCounters.filter(x=>x!==i);else if(ourCounters.length<2)ourCounters.push(i);renderStep();}
function toggleTheirCounter(j){if(theirCounters.includes(j))theirCounters=theirCounters.filter(x=>x!==j);else if(theirCounters.length<2)theirCounters.push(j);renderStep();}
function confirmCounters(){if(ourCounters.length!==2||theirCounters.length!==2)return;currentStep='pick1';renderStep();}

function makePick(picker, chosenIdx) {
  if (picker === 'us') {
    pendingPairing = {ours: ourDefenderIdx, theirs: chosenIdx};
    pairedOurs.add(ourDefenderIdx);
    pairedTheirs.add(chosenIdx);
    theirCounters = theirCounters.filter(j => j !== chosenIdx);
    pendingAfterStep = currentStep === 'pick1' ? 'pick2' : 'nextRound';
  } else {
    pendingPairing = {ours: chosenIdx, theirs: theirDefenderIdx};
    pairedOurs.add(chosenIdx);
    pairedTheirs.add(theirDefenderIdx);
    ourCounters = ourCounters.filter(i => i !== chosenIdx);
    pendingAfterStep = currentStep === 'pick1' ? 'pick2' : 'nextRound';
  }
  render();
  currentStep = 'mapSelect';
  renderMapSelect();
}

// ========== INIT ==========
async function initApp() {
  loadState();
  loadGame();
  const token = getGhToken();
  if (!token) {
    setSyncStatus('No token \u2014 click Set Token', 'disconnected');
    return;
  }
  setSyncStatus('Connecting...', 'syncing');
  try {
    const remoteData = await ghApiFetch(token);
    const remoteTs = remoteData.ts || 0;
    const remoteHasData = remoteData.games && remoteData.games.some(g =>
      (g.pairings && g.pairings.length > 0) || (g.ratings && g.ratings.some(row => row.some(c => c !== 'none')))
    );

    if (remoteHasData && remoteTs > 0) {
      lastRemoteTs = remoteTs;
      applyPayload(remoteData);
      setSyncStatus('Synced \u2713', 'connected');
    } else if (localHasData()) {
      setSyncStatus('Uploading local data...', 'syncing');
      await pushToRemote();
    } else {
      setSyncStatus('Synced \u2713', 'connected');
    }
  } catch(e) {
    console.error('Init sync failed:', e);
    setSyncStatus('Offline \u2014 using local data', 'disconnected');
  }
  startSyncPolling();
}

// Check auth on load
checkAuth();
</script>
